# Smoke-test config for Recipe 1 — Quick MNRL baseline (pair shape).
# Exercises in-batch-negative MNRL + GradCache auto-swap end-to-end.
# Pair with examples/smoke/dataset/prepare_smoke.py and
# examples/smoke/run.sh.
# Worked example: this is the minimal complete config for Recipe 1.

processed_dir: data/processed/smoke-bi-encoder
model_name: sentence-transformers/all-MiniLM-L6-v2   # 22M params — runs everywhere, even CPU
output_dir: outputs/smoke_bi_encoder_r1
experiment_id: null
attn_implementation: sdpa

num_train_epochs: 1
max_steps: -1
per_device_train_batch_size: 4
per_device_eval_batch_size: 8
gradient_accumulation_steps: 1
learning_rate: 5e-5
weight_decay: 0.0
warmup_ratio: 0.0
max_grad_norm: 1.0
lr_scheduler_type: linear
optim: adamw_torch_fused
seed: 42

eval_strategy: epoch
save_strategy: epoch
eval_steps: null
save_steps: null
load_best_model_at_end: true
metric_for_best_model: f1                            # auto-replaced with the evaluator's metric
greater_is_better: true
save_total_limit: 1
early_stopping_patience: null

precision: auto
gradient_checkpointing: false
torch_compile: false
train_sampling_strategy: random
dataloader_num_workers: 0
pad_to_multiple_of: 8

logging_steps: 5
report_to: none                                       # smoke runs offline

wandb_project: null
wandb_run_name: null
wandb_tags: []
wandb_notes: null

bi_encoder:
  loss:
    name: MultipleNegativesRankingLoss
    kwargs:
      scale: 20.0
  batch_sampler: NO_DUPLICATES
  matryoshka:
    enabled: false
  # GradCache on by default — same code path as the real configs, so the
  # smoke test exercises the MNRL → CachedMNRL auto-swap end-to-end.
  # With batch 4 + mini_batch_size 2, caching splits into 2 chunks per step.
  gradient_caching:
    enabled: true
    mini_batch_size: 2
