# LoRA fine-tune of Qwen2.5-VL-3B on CORD-v2 (receipt -> JSON).
# Demonstrates the GENERIC text-target path (vlm.task: text) — no boxes/points,
# just image -> free-form string, scored by exact-match / token-F1.
processed_dir: data/processed/cord
model_name: Qwen/Qwen2.5-VL-3B-Instruct
output_dir: outputs/cord_qwen25vl_3b
experiment_id: lora_text

num_train_epochs: 5
max_steps: -1
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1e-4
weight_decay: 0.01
warmup_ratio: 0.03
max_grad_norm: 1.0
lr_scheduler_type: cosine
optim: adamw_torch_fused
seed: 42

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: token_f1         # eval callback publishes eval_token_f1 / eval_exact_match
greater_is_better: true
save_total_limit: 2
early_stopping_patience: 2

precision: auto
gradient_checkpointing: true
torch_compile: false
dataloader_num_workers: 4

logging_steps: 10
report_to: "none"

vlm:
  task: text                            # <-- the generic free-form path
  max_length: 2048                      # JSON targets are long; cap the packed sequence
  freeze_vision_tower: true

  image_min_pixels: 200704
  image_max_pixels: 1003520

  eval:
    max_new_tokens: 768                 # receipts produce long JSON
    max_samples: 200

  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: auto

  quant:
    load_in_4bit: false
