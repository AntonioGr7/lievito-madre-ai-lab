# Smoke config — generic free-text (task: text) path on the tiny fixture.
# Exercises the full load -> LoRA -> train -> generate-eval path for the
# image->free-form-string contract (scored by exact-match / token-F1), with the
# smallest real VLM so it runs end-to-end on CPU without a large download.
processed_dir: tests/fixtures/vlm_text_tiny
model_name: HuggingFaceTB/SmolVLM-256M-Instruct
output_dir: outputs/_smoke_text
experiment_id: smoke_text

num_train_epochs: 1
max_steps: -1
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1e-4
weight_decay: 0.0
warmup_ratio: 0.0
max_grad_norm: 1.0
lr_scheduler_type: constant
optim: adamw_torch
seed: 42

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: false
metric_for_best_model: eval_token_f1
greater_is_better: true
save_total_limit: 1
early_stopping_patience: null

precision: fp32
gradient_checkpointing: false
torch_compile: false
dataloader_num_workers: 0

logging_steps: 1
report_to: "none"

vlm:
  task: text
  max_length: 1536                        # SmolVLM tiles a single image into ~1196 tokens;
                                          # must exceed that or truncation slices the image
                                          # span and the Idefics3 processor crashes (tfm 5.x).
  freeze_vision_tower: true
  eval:
    max_new_tokens: 32
    max_samples: 2
  lora:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.0
    target_modules: auto
  quant:
    load_in_4bit: false
