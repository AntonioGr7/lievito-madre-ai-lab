# QLoRA (4-bit) fine-tune of Qwen2.5-VL-3B on CPPE-5 — fits a 16GB T4.
# Requires bitsandbytes:  pip install -e ".[quant]"
processed_dir: data/processed/cppe5
model_name: Qwen/Qwen2.5-VL-3B-Instruct
output_dir: outputs/cppe5_qwen25vl_3b
experiment_id: qlora_r16

num_train_epochs: 5
max_steps: -1
per_device_train_batch_size: 1
per_device_eval_batch_size: 2
gradient_accumulation_steps: 16         # effective batch = 16
learning_rate: 2e-4                     # QLoRA tolerates / likes a higher LR
weight_decay: 0.01
warmup_ratio: 0.03
max_grad_norm: 1.0
lr_scheduler_type: cosine
optim: paged_adamw_8bit                  # paged optimizer avoids OOM spikes under 4-bit
seed: 42

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: f1
greater_is_better: true
save_total_limit: 2
early_stopping_patience: 2

precision: auto                          # fp16 on T4; bf16 on Ampere+
gradient_checkpointing: true             # essential at 16GB
torch_compile: false
dataloader_num_workers: 2

logging_steps: 10
report_to: "none"

vlm:
  task: box
  coord_bins: 1000
  max_length: 2048
  freeze_vision_tower: true
  add_coord_special_tokens: false

  image_min_pixels: 200704
  image_max_pixels: 602112               # 768 * 28 * 28 — smaller ceiling for 16GB

  eval:
    max_new_tokens: 512
    iou_threshold: 0.5
    max_samples: 100

  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: auto

  quant:
    load_in_4bit: true
    bnb_4bit_quant_type: nf4
    bnb_4bit_use_double_quant: true
    bnb_4bit_compute_dtype: bfloat16     # use float16 on T4 (no bf16)
