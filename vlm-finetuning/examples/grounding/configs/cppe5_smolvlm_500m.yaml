# Lightweight LoRA fine-tune of SmolVLM-500M on CPPE-5 (point task).
# A genuinely small VLM — trains on an 8-12GB GPU, or slowly on CPU. Good for
# iterating on the pipeline before committing GPU hours to the 3B model.
processed_dir: data/processed/cppe5
model_name: HuggingFaceTB/SmolVLM-500M-Instruct
output_dir: outputs/cppe5_smolvlm_500m
experiment_id: lora_point

num_train_epochs: 8
max_steps: -1
per_device_train_batch_size: 4
per_device_eval_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 2e-4
weight_decay: 0.01
warmup_ratio: 0.03
max_grad_norm: 1.0
lr_scheduler_type: cosine
optim: adamw_torch_fused
seed: 42

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: f1
greater_is_better: true
save_total_limit: 2
early_stopping_patience: 3

precision: auto
gradient_checkpointing: true
torch_compile: false
dataloader_num_workers: 4

logging_steps: 10
report_to: "none"

vlm:
  task: point                            # supervise on box-centre points
  coord_bins: 1000
  max_length: 1536
  freeze_vision_tower: true
  add_coord_special_tokens: false
  eval:
    max_new_tokens: 256
    iou_threshold: 0.5                   # unused for the point task (point-in-box)
    max_samples: 200
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: auto
  quant:
    load_in_4bit: false
