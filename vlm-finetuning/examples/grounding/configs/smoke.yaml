# Smoke config — pointed at the tiny fixture, runs end-to-end on CPU.
# Uses the smallest real VLM so the full load → LoRA → train → generate-eval
# path is exercised without a GPU.
processed_dir: tests/fixtures/vlm_tiny
model_name: HuggingFaceTB/SmolVLM-256M-Instruct
output_dir: outputs/_smoke
experiment_id: smoke

num_train_epochs: 1
max_steps: -1
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1e-4
weight_decay: 0.0
warmup_ratio: 0.0
max_grad_norm: 1.0
lr_scheduler_type: constant
optim: adamw_torch
seed: 42

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: false
metric_for_best_model: eval_f1
greater_is_better: true
save_total_limit: 1
early_stopping_patience: null

precision: fp32
gradient_checkpointing: false
torch_compile: false
dataloader_num_workers: 0

logging_steps: 1
report_to: "none"

vlm:
  task: box
  coord_bins: 1000
  max_length: 1024
  freeze_vision_tower: true
  add_coord_special_tokens: false
  eval:
    max_new_tokens: 64
    iou_threshold: 0.5
    max_samples: 2
  lora:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.0
    target_modules: auto
  quant:
    load_in_4bit: false
