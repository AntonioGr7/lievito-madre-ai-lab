processed_dir: data/processed/open-pii-masking-500k-ai4privacy
model_name: microsoft/mdeberta-v3-base  
output_dir: outputs/pii_mbert
experiment_id: token_exp_01  # uncomment to save to outputs/pii_mbert/exp_01
attn_implementation: eager  # "sdpa" | "flash_attention_2" | "eager"

num_train_epochs: 3
max_steps: -1                     # -1 = use num_train_epochs; >0 overrides epochs
per_device_train_batch_size: 4   # 512-token sequences are memory-heavy
per_device_eval_batch_size: 4
gradient_accumulation_steps: 2    # effective batch = 32
learning_rate: 3e-5
weight_decay: 0.01
warmup_ratio: 0.06
max_grad_norm: 1.0
lr_scheduler_type: linear
optim: adamw_torch_fused          # fused AdamW (PyTorch 2.x, ~15-20% faster)
seed: 42

eval_strategy: epoch              # "epoch" | "steps" | "no". Use "steps" with max_steps.
save_strategy: epoch              # "epoch" | "steps" | "no". Must match eval_strategy if load_best_model_at_end.
eval_steps: null                  # required when eval_strategy == "steps" (e.g. 100)
save_steps: null                  # required when save_strategy == "steps" (must be a multiple of eval_steps)
load_best_model_at_end: true
metric_for_best_model: f1
greater_is_better: true
save_total_limit: 2
early_stopping_patience: 2        # null disables; integer enables the callback
eval_accumulation_steps: 50       # offload eval tensors GPU→CPU every N steps; null = keep everything on GPU

precision: auto                   # "auto" | "bf16" | "fp16" | "fp32" — auto picks bf16 on Ampere+

gradient_checkpointing: false     # set true to cut memory ~40% at ~20% speed cost
torch_compile: false              # true = 1.3-1.6× speedup; may need warmup on first step
train_sampling_strategy: group_by_length  # "random" | "sequential" | "group_by_length"
dataloader_num_workers: 4
pad_to_multiple_of: 8             # keeps tensor cores fed under fp16/bf16

logging_steps: 50
report_to: wandb

# Weights & Biases — only used when report_to is "wandb"
wandb_project: lievito-madre-ai-lab
wandb_run_name: "pii-mbert-001"
wandb_tags: []
wandb_notes: null
