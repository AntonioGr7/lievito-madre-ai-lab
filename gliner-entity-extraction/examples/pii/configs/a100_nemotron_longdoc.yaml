# A100 (40 GB) full fine-tuning on Nemotron-PII — LONG-DOCUMENT variant.
#
# Identical to a100_nemotron.yaml except sliding-window chunking is ON. Use
# this when your corpus has rows longer than the checkpoint's max_len (2048
# word-tokens for modern-gliner-bi-large): instead of silently truncating to
# 2048 and dropping tail entities, long rows are split into overlapping windows
# so every entity stays fully visible in at least one chunk. Predictions are
# stitched back together at inference time (serve.py merges overlap spans).
#
# Peak memory is unchanged vs. the chunking-off recipe — the max sequence length
# is still 2048; long docs just yield several 2048-token chunks instead of one
# truncated one. Training is somewhat longer (more chunks → more steps).
#
# Prep is the SAME as the base recipe (chunking happens at train time, not prep):
#   python examples/pii/dataset/prepare_nemotron.py \
#       --out-dir data/processed/nemotron-gliner
#   python scripts/train_gliner.py \
#       --config examples/pii/configs/a100_nemotron_longdoc.yaml
#
# SMOKE-TEST FIRST (bi-encoder + chunking path):
#   ... train_gliner.py --config <this> --max-train-samples 200 \
#       --max-eval-samples 100 --max-test-samples 100
# Confirm eval_f1 climbs off zero and you see "+N from long documents" in the
# chunking log (proves long rows are actually being split, not truncated).

processed_dir: data/processed/nemotron-gliner
model_name: knowledgator/modern-gliner-bi-large-v1.0
output_dir: outputs/a100_nemotron_longdoc
experiment_id: a100_nemotron_longdoc_01

# --- core training -----------------------------------------------------
num_train_epochs: 3
max_steps: -1
per_device_train_batch_size: 8       # same 2048-token max seq as the base recipe → same peak memory
per_device_eval_batch_size: 16
gradient_accumulation_steps: 4       # effective batch = 32
learning_rate: 7e-6                  # encoder LR for a large full-FT; head = lr × head_lr_multiplier
weight_decay: 0.01
warmup_ratio: 0.1
max_grad_norm: 1.0
lr_scheduler_type: cosine
optim: adamw_torch_fused
seed: 42

# --- eval & checkpointing ---------------------------------------------
eval_strategy: epoch
save_strategy: epoch
eval_steps: null
save_steps: null
load_best_model_at_end: true
metric_for_best_model: eval_f1
greater_is_better: true
save_total_limit: 2
early_stopping_patience: 2
eval_accumulation_steps: null

# --- compute / throughput ---------------------------------------------
precision: bf16
gradient_checkpointing: true
torch_compile: false
train_sampling_strategy: random
dataloader_num_workers: 8
pad_to_multiple_of: 8

logging_steps: 50
report_to: wandb

wandb_project: lievito-madre-ai-lab
wandb_run_name: "a100-nemotron-modern-bi-longdoc-001"
wandb_tags: ["a100", "full-ft", "modern-gliner-bi", "nemotron-pii", "chunking"]
wandb_notes: "ModernBERT bi-encoder, full FT, sliding-window chunking ON (long docs)."

# --- GLiNER-specific knobs --------------------------------------------
gliner:
  # max_span_width intentionally OMITTED (bi-encoder default) — see base recipe.

  loss:
    funcs: ["focal"]
    focal_alpha: 0.75
    focal_gamma: 2.0
    reduction: sum

  sampling:
    max_types: 40
    max_neg_type_ratio: 2.0
    random_drop: 0.1

  head_lr_multiplier: 5.0

  # PII is recall-sensitive — tune the persisted threshold for F2, not F1.
  threshold_objective: f2

  peft:
    enabled: false

  chunking:
    # ON. stride = overlapping word-tokens between consecutive windows, so an
    # entity split across a boundary stays whole in at least one chunk. Larger
    # stride = safer boundaries but more chunks. max_words is left unset → it
    # defaults to model.config.max_len (2048 here), so no chunk ever exceeds the
    # cap and nothing is truncated. The same stride/max_words are recorded in
    # preprocessing.json and replayed by serve.py at inference time.
    stride: 128
    # max_words: 2048          # uncomment to pin explicitly instead of using max_len

  label_aliases: {}            # snake_case auto-humanized at train/eval/serve
