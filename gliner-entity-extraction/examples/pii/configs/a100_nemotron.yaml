# A100 (40 GB) full fine-tuning on Nemotron-PII — frontier-SOTA recipe.
#
# Backbone: knowledgator/modern-gliner-bi-large-v1.0
#   - ModernBERT *bi-encoder*: a separate label encoder scales cleanly to
#     Nemotron-PII's ~55 entity types (the architecture the "million-label
#     NER" work is built on), and ModernBERT gives a native 8192-token context
#     + 3-4x throughput over DeBERTa-v3.
#   - Sliding-window chunking is turned OFF below (stride: -1) since most
#     Nemotron rows are short. NOTE: GLiNER still caps inputs at
#     model.config.max_len (2048 for this checkpoint), so longer rows truncate
#     — see the `chunking` block to turn it on for long-document corpora.
#
# Prep the dataset first (carves a 10% validation split off train):
#   python examples/pii/dataset/prepare_nemotron.py \
#       --out-dir data/processed/nemotron-gliner
#   python scripts/train_gliner.py \
#       --config examples/pii/configs/a100_nemotron.yaml
#
# SMOKE-TEST FIRST. This is the only config that fine-tunes a bi-encoder
# backbone, which exercises the multi-encoder gradient-checkpointing path. Do
# one short run before committing the GPU:
#   ... train_gliner.py --config <this> --max-train-samples 200 \
#       --max-eval-samples 100 --max-test-samples 100
# and confirm eval_f1 climbs off zero (a flat-zero f1 means the offset guard
# should have fired — check the words_splitter).

processed_dir: data/processed/nemotron-gliner
model_name: knowledgator/modern-gliner-bi-large-v1.0
output_dir: outputs/a100_nemotron
experiment_id: a100_nemotron_01

# --- core training -----------------------------------------------------
num_train_epochs: 3
max_steps: -1
per_device_train_batch_size: 8       # GC + bf16 fits 8 comfortably on 40 GB;
per_device_eval_batch_size: 16       #   bump to 16 once a smoke run confirms headroom
gradient_accumulation_steps: 4       # effective batch = 32
learning_rate: 7e-6                  # encoder LR for a large full-FT; head = lr × head_lr_multiplier
weight_decay: 0.01
warmup_ratio: 0.1                    # a touch more warmup for stable large full-FT
max_grad_norm: 1.0
lr_scheduler_type: cosine
optim: adamw_torch_fused
seed: 42

# --- eval & checkpointing ---------------------------------------------
eval_strategy: epoch
save_strategy: epoch
eval_steps: null
save_steps: null
load_best_model_at_end: true
metric_for_best_model: eval_f1       # populated by EvalCallback
greater_is_better: true
save_total_limit: 2
early_stopping_patience: 2
eval_accumulation_steps: null

# --- compute / throughput ---------------------------------------------
precision: bf16                      # A100 is Ampere — native BF16 (+ TF32 matmuls)
gradient_checkpointing: true         # large full-FT on 40 GB — keep activations cheap
torch_compile: false                 # enable after the bi-encoder path is smoke-tested clean
train_sampling_strategy: random
dataloader_num_workers: 8
pad_to_multiple_of: 8

logging_steps: 50
report_to: wandb

wandb_project: lievito-madre-ai-lab
wandb_run_name: "a100-nemotron-modern-bi-001"
wandb_tags: ["a100", "full-ft", "modern-gliner-bi", "nemotron-pii"]
wandb_notes: "Frontier-SOTA: ModernBERT bi-encoder, full FT, chunking off."

# --- GLiNER-specific knobs --------------------------------------------
gliner:
  # max_span_width intentionally OMITTED. Retargeting it can invalidate
  # pretrained span-rep weights on some layers (see _retarget_span_rep_max_width);
  # for this bi-encoder we keep the backbone's own default. Set it only if a
  # smoke run shows it's reshape-only and you need longer spans.

  loss:
    funcs: ["focal"]                 # focal handles the heavy negative-span imbalance
    focal_alpha: 0.75
    focal_gamma: 2.0
    # BF16 keeps gradients finite under "sum" (no GradScaler), so we preserve
    # GLiNER's historical "sum" weighting. Switch to "mean" if loss spikes.
    reduction: sum

  sampling:
    # Nemotron-PII has ~55 categories. Show most of them per example and lean
    # on a higher negative ratio so the model learns to *reject* wrong types
    # (directly improves the held-out zero-shot probe).
    max_types: 40
    max_neg_type_ratio: 2.0
    random_drop: 0.1

  head_lr_multiplier: 5.0            # head LR = learning_rate × this

  # PII is recall-sensitive — tune the persisted threshold for F2, not F1
  # (F1 lands too high, e.g. ~0.6, and strangles recall on general/OOD text).
  threshold_objective: f2

  peft:
    enabled: false                   # full fine-tuning

  chunking:
    stride: -1                       # OFF by default — most Nemotron rows are short.
    # IMPORTANT: GLiNER caps inputs at model.config.max_len = 2048 for this
    # checkpoint (NOT ModernBERT's 8192 positional limit). With chunking off,
    # any row longer than ~2048 word-tokens is silently truncated and entities
    # past the cap are lost (you'll see "Sentence ... truncated to 2048"
    # warnings). If your corpus has many long rows, turn chunking ON so they're
    # split into overlapping windows — e.g. stride: 128 (max_words then defaults
    # to model.config.max_len). Changing this requires retraining to benefit.

  # Nemotron labels are snake_case (first_name, medical_record_number, ...).
  # They are auto-humanized to natural-language prompts ("first name",
  # "medical record number") at train, eval, AND serve time — consistently —
  # so this can stay empty and still get the benefit. Add an entry only to
  # override a label the generic humanizer can't split (e.g. concatenated
  # all-caps like "GIVENNAME": "given name").
  label_aliases: {}
