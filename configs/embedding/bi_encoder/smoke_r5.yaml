# Smoke-test config for Recipe 5 — Matryoshka 2D (dim × depth).
# One artifact serves heterogeneous hardware: full model at full dim on
# strong GPUs; shallow truncated version of the SAME weights on edge.
# Layer truncation is applied at INFERENCE time (predictor's
# `truncate_layers=N`) but only works on Matryoshka2d / AdaptiveLayer-
# trained models — that's what this config produces.
# Worked example: this is the minimal complete config for Recipe 5.

processed_dir: data/processed/smoke-bi-encoder
model_name: sentence-transformers/all-MiniLM-L6-v2   # 6 layers, native dim 384
output_dir: outputs/smoke_bi_encoder_r5
experiment_id: null
attn_implementation: sdpa

num_train_epochs: 1
max_steps: -1
per_device_train_batch_size: 4
per_device_eval_batch_size: 8
gradient_accumulation_steps: 1
learning_rate: 5e-5
weight_decay: 0.0
warmup_ratio: 0.0
max_grad_norm: 1.0
lr_scheduler_type: linear
optim: adamw_torch_fused
seed: 42

eval_strategy: epoch
save_strategy: epoch
eval_steps: null
save_steps: null
load_best_model_at_end: true
metric_for_best_model: f1
greater_is_better: true
save_total_limit: 1
early_stopping_patience: null

precision: auto
gradient_checkpointing: false
torch_compile: false
train_sampling_strategy: random
dataloader_num_workers: 0
pad_to_multiple_of: 8

logging_steps: 5
report_to: none

wandb_project: null
wandb_run_name: null
wandb_tags: []
wandb_notes: null

bi_encoder:
  loss:
    name: MultipleNegativesRankingLoss
    kwargs:
      scale: 20.0
  batch_sampler: NO_DUPLICATES
  matryoshka:
    enabled: true
    mode: "2d"                                       # depth × dim
    dims: [384, 256, 128, 64]
    n_layers_per_step: 1                             # train every layer; 4 = train every 4th (cheaper)
    last_layer_weight: 1.0
    prior_layers_weight: 1.0
    kl_div_weight: 1.0                               # aligns earlier layers' outputs with the last
    kl_temperature: 0.3
  gradient_caching:
    enabled: true
    mini_batch_size: 2
